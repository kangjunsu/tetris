<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테트리스</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 5px 20px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.3);
            --shadow-xl: 0 20px 80px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.15) 0%, transparent 50%);
            animation: aurora 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes aurora {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: scaleIn 0.6s ease-out;
        }

        h1 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 30px;
            font-size: 3em;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        .game-area {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        #game-board {
            border: 4px solid #1d1d1f;
            background: #000;
            box-shadow: var(--shadow-xl);
            border-radius: 8px;
            animation: scaleIn 0.8s ease-out 0.3s both;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 220px;
            animation: slideInRight 0.8s ease-out 0.4s both;
        }

        .info-box {
            background: var(--primary-gradient);
            color: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .info-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .info-box h2 {
            font-size: 0.9em;
            margin-bottom: 12px;
            opacity: 0.9;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box .value {
            font-size: 2.5em;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        #next-piece {
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .controls {
            background: rgba(248, 249, 250, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            font-size: 0.85em;
            color: #666;
            line-height: 1.9;
            box-shadow: var(--shadow-sm);
        }

        .controls h3 {
            color: #1d1d1f;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 1.1em;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .game-over-content {
            background: white;
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-xl);
            animation: scaleIn 0.4s ease-out;
            max-width: 400px;
        }

        .game-over-content h2 {
            font-size: 2.5em;
            color: #e74c3c;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .game-over-content p {
            font-size: 1.3em;
            color: #1d1d1f;
            margin-bottom: 20px;
        }

        .game-over-content #final-score {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
            display: block;
            margin-top: 12px;
        }

        #pause-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: fadeIn 0.2s ease-out;
        }

        .pause-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.3s ease-out;
        }

        .pause-content h2 {
            font-size: 2em;
            color: #1d1d1f;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .pause-content p {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .pause-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .pause-buttons button {
            flex: 1;
        }

        #combo-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.6);
            z-index: 998;
            pointer-events: none;
            opacity: 0;
            animation: comboAnimation 1s ease-out;
        }

        @keyframes comboAnimation {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .best-score {
            font-size: 0.9em;
            color: #999;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 20px 10px;
            }

            .container {
                padding: 20px;
                width: 100%;
            }

            h1 {
                font-size: 2em;
                margin-bottom: 20px;
            }

            .game-area {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            #game-board {
                width: 280px !important;
                height: 560px !important;
            }

            .info-panel {
                width: 100%;
                max-width: 280px;
            }

            .game-over-content,
            .pause-content {
                padding: 30px;
                margin: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 테트리스</h1>
        <div class="game-area">
            <canvas id="game-board" width="300" height="600"></canvas>
            <div class="info-panel">
                <div class="info-box">
                    <h2>점수</h2>
                    <div class="value" id="score">0</div>
                </div>
                <div class="info-box">
                    <h2>레벨</h2>
                    <div class="value" id="level">1</div>
                </div>
                <div class="info-box">
                    <h2>라인</h2>
                    <div class="value" id="lines">0</div>
                </div>
                <div class="info-box">
                    <h2>다음 블록</h2>
                    <canvas id="next-piece" width="120" height="120"></canvas>
                </div>
                <button id="start-btn">시작</button>
                <div class="controls">
                    <h3>⌨️ 조작법</h3>
                    <div>← → 좌우 이동</div>
                    <div>↓ 빠르게 내리기</div>
                    <div>↑ 회전</div>
                    <div>Space 한번에 내리기</div>
                    <div><strong>P / ESC</strong> 일시정지</div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-over-overlay">
        <div class="game-over-content">
            <h2>게임 오버!</h2>
            <p>최종 점수: <span id="final-score">0</span></p>
            <div class="best-score" id="best-score-display"></div>
            <button id="restart-btn">다시 시작</button>
        </div>
    </div>

    <div id="pause-overlay">
        <div class="pause-content">
            <h2>⏸️ 일시정지</h2>
            <p>현재 점수: <strong id="pause-score">0</strong></p>
            <div class="pause-buttons">
                <button id="resume-btn">계속하기</button>
                <button id="restart-from-pause-btn">재시작</button>
            </div>
        </div>
    </div>

    <div id="combo-message"></div>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece');
        const nextCtx = nextCanvas.getContext('2d');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        // 테트로미노 모양 정의
        const SHAPES = [
            [[1, 1, 1, 1]], // I
            [[1, 1], [1, 1]], // O
            [[1, 1, 1], [0, 1, 0]], // T
            [[1, 1, 1], [1, 0, 0]], // L
            [[1, 1, 1], [0, 0, 1]], // J
            [[1, 1, 0], [0, 1, 1]], // S
            [[0, 1, 1], [1, 1, 0]]  // Z
        ];

        const COLORS = [
            '#00f0f0', // I - 시안
            '#f0f000', // O - 노랑
            '#a000f0', // T - 보라
            '#f0a000', // L - 주황
            '#0000f0', // J - 파랑
            '#00f000', // S - 초록
            '#f00000'  // Z - 빨강
        ];

        let board = [];
        let score = 0;
        let level = 1;
        let lines = 0;
        let currentPiece = null;
        let nextPiece = null;
        let gameInterval = null;
        let gameRunning = false;
        let gamePaused = false;
        let bestScore = localStorage.getItem('tetris-best-score') || 0;
        let animationFrameId = null;

        // 게임 보드 초기화
        function initBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        }

        // 새 블록 생성
        function createPiece() {
            const shapeIndex = Math.floor(Math.random() * SHAPES.length);
            return {
                shape: SHAPES[shapeIndex],
                color: COLORS[shapeIndex],
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[shapeIndex][0].length / 2),
                y: 0
            };
        }

        // 블록 회전
        function rotate(piece) {
            const rotated = piece.shape[0].map((_, i) =>
                piece.shape.map(row => row[i]).reverse()
            );
            return { ...piece, shape: rotated };
        }

        // 충돌 감지
        function collision(piece, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 블록 합치기
        function merge() {
            currentPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                });
            });
        }

        // 완성된 라인 제거
        function clearLines() {
            let linesCleared = 0;

            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }

            if (linesCleared > 0) {
                lines += linesCleared;
                score += [0, 100, 300, 500, 800][linesCleared] * level;
                level = Math.floor(lines / 10) + 1;
                updateDisplay();
                showComboMessage(linesCleared);
            }
        }

        // 콤보 메시지 표시
        function showComboMessage(linesCleared) {
            const messages = ['', 'SINGLE!', 'DOUBLE!', 'TRIPLE!', 'TETRIS!'];
            const comboEl = document.getElementById('combo-message');
            comboEl.textContent = messages[linesCleared] || '';
            comboEl.style.animation = 'none';
            setTimeout(() => {
                comboEl.style.animation = 'comboAnimation 1s ease-out';
            }, 10);
        }

        // 화면 표시 업데이트
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }

        // 고스트 피스 Y 위치 계산
        function getGhostY() {
            if (!currentPiece) return 0;
            let ghostY = currentPiece.y;
            while (!collision({ ...currentPiece, y: ghostY }, 0, 1)) {
                ghostY++;
            }
            return ghostY;
        }

        // 보드 그리기
        function drawBoard() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 고정된 블록 그리기
            board.forEach((row, y) => {
                row.forEach((color, x) => {
                    if (color) {
                        drawBlock(ctx, x, y, color);
                    }
                });
            });

            // 고스트 피스 그리기
            if (currentPiece && gameRunning && !gamePaused) {
                const ghostY = getGhostY();
                if (ghostY !== currentPiece.y) {
                    currentPiece.shape.forEach((row, y) => {
                        row.forEach((value, x) => {
                            if (value) {
                                drawGhostBlock(ctx, currentPiece.x + x, ghostY + y);
                            }
                        });
                    });
                }
            }

            // 현재 블록 그리기
            if (currentPiece) {
                currentPiece.shape.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value) {
                            drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, currentPiece.color);
                        }
                    });
                });
            }

            // 그리드 선 그리기
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
        }

        // 고스트 블록 그리기
        function drawGhostBlock(context, x, y) {
            context.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            context.lineWidth = 2;
            context.strokeRect(x * BLOCK_SIZE + 2, y * BLOCK_SIZE + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
        }

        // 블록 그리기
        function drawBlock(context, x, y, color) {
            context.fillStyle = color;
            context.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);

            // 3D 효과
            context.fillStyle = 'rgba(255, 255, 255, 0.3)';
            context.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, 3);
            context.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, 3, BLOCK_SIZE - 2);
        }

        // 다음 블록 미리보기
        function drawNextPiece() {
            nextCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (nextPiece) {
                const offsetX = (nextCanvas.width / BLOCK_SIZE - nextPiece.shape[0].length) / 2;
                const offsetY = (nextCanvas.height / BLOCK_SIZE - nextPiece.shape.length) / 2;

                nextPiece.shape.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value) {
                            drawBlock(nextCtx, offsetX + x, offsetY + y, nextPiece.color);
                        }
                    });
                });
            }
        }

        // 블록 이동
        function moveDown() {
            if (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                merge();
                clearLines();
                currentPiece = nextPiece;
                nextPiece = createPiece();
                drawNextPiece();

                if (collision(currentPiece)) {
                    gameOver();
                }
            }
            drawBoard();
        }

        // 한번에 내리기
        function dropDown() {
            while (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            updateDisplay();
            moveDown();
        }

        // 일시정지 토글
        function togglePause() {
            if (!gameRunning) return;

            gamePaused = !gamePaused;
            const pauseOverlay = document.getElementById('pause-overlay');

            if (gamePaused) {
                clearInterval(gameInterval);
                document.getElementById('pause-score').textContent = score;
                pauseOverlay.style.display = 'flex';
            } else {
                pauseOverlay.style.display = 'none';
                gameInterval = setInterval(() => {
                    moveDown();
                }, 1000 - (level - 1) * 100);
            }
        }

        // 키보드 입력 처리
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || !currentPiece) return;

            // 일시정지
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                e.preventDefault();
                togglePause();
                return;
            }

            if (gamePaused) return;

            switch(e.key) {
                case 'ArrowLeft':
                    if (!collision(currentPiece, -1, 0)) {
                        currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (!collision(currentPiece, 1, 0)) {
                        currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (!collision(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        score += 1;
                        updateDisplay();
                    }
                    break;
                case 'ArrowUp':
                    const rotated = rotate(currentPiece);
                    if (!collision(rotated)) {
                        currentPiece = rotated;
                    }
                    break;
                case ' ':
                    e.preventDefault();
                    dropDown();
                    break;
            }
            drawBoard();
        });

        // 게임 시작
        function startGame() {
            initBoard();
            score = 0;
            level = 1;
            lines = 0;
            gameRunning = true;
            gamePaused = false;

            currentPiece = createPiece();
            nextPiece = createPiece();

            updateDisplay();
            updateBestScoreDisplay();
            drawBoard();
            drawNextPiece();

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                moveDown();
            }, 1000 - (level - 1) * 100);

            document.getElementById('start-btn').textContent = '게임 중...';
            document.getElementById('start-btn').disabled = true;
            document.getElementById('pause-overlay').style.display = 'none';
        }

        // 최고 점수 표시 업데이트
        function updateBestScoreDisplay() {
            const bestScoreEl = document.getElementById('best-score-display');
            if (bestScore > 0) {
                bestScoreEl.textContent = `🏆 최고 기록: ${bestScore}`;
            }
        }

        // 게임 오버
        function gameOver() {
            gameRunning = false;
            gamePaused = false;
            clearInterval(gameInterval);

            // 최고 점수 갱신
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('tetris-best-score', bestScore);
            }

            animateScore(0, score, 1000);
            updateBestScoreDisplay();
            document.getElementById('game-over-overlay').style.display = 'flex';
            document.getElementById('start-btn').textContent = '시작';
            document.getElementById('start-btn').disabled = false;
        }

        // 점수 카운트업 애니메이션
        function animateScore(start, end, duration) {
            const startTime = performance.now();
            const finalScoreEl = document.getElementById('final-score');

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.floor(start + (end - start) * progress);
                finalScoreEl.textContent = current;

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        // 이벤트 리스너
        document.getElementById('start-btn').addEventListener('click', startGame);

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-overlay').style.display = 'none';
            startGame();
        });

        document.getElementById('resume-btn').addEventListener('click', () => {
            togglePause();
        });

        document.getElementById('restart-from-pause-btn').addEventListener('click', () => {
            document.getElementById('pause-overlay').style.display = 'none';
            gamePaused = false;
            startGame();
        });

        // 터치 컨트롤 (모바일)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning || gamePaused || !currentPiece) return;

            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 좌우 스와이프
                if (Math.abs(deltaX) > 30) {
                    if (deltaX > 0) {
                        if (!collision(currentPiece, 1, 0)) {
                            currentPiece.x++;
                        }
                    } else {
                        if (!collision(currentPiece, -1, 0)) {
                            currentPiece.x--;
                        }
                    }
                }
            } else {
                // 상하 스와이프
                if (Math.abs(deltaY) > 30) {
                    if (deltaY > 0) {
                        // 아래로 스와이프 - 소프트 드롭
                        if (!collision(currentPiece, 0, 1)) {
                            currentPiece.y++;
                            score += 1;
                            updateDisplay();
                        }
                    } else {
                        // 위로 스와이프 - 회전
                        const rotated = rotate(currentPiece);
                        if (!collision(rotated)) {
                            currentPiece = rotated;
                        }
                    }
                }
            }

            // 탭 (짧은 터치) - 하드 드롭
            if (Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
                dropDown();
            }

            drawBoard();
        });

        // 초기 화면
        updateBestScoreDisplay();
        drawBoard();
        drawNextPiece();
    </script>
</body>
</html>
