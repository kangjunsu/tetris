<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테트리스</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 5px 20px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.3);
            --shadow-xl: 0 20px 80px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.15) 0%, transparent 50%);
            animation: aurora 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes aurora {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            position: relative;
            z-index: 1;
            animation: scaleIn 0.6s ease-out;
        }

        h1 {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 30px;
            font-size: 3em;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        .game-area {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        #game-board {
            border: 4px solid #1d1d1f;
            background: #000;
            box-shadow: var(--shadow-xl);
            border-radius: 8px;
            animation: scaleIn 0.8s ease-out 0.3s both;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 220px;
            animation: slideInRight 0.8s ease-out 0.4s both;
        }

        .info-box {
            background: var(--primary-gradient);
            color: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .info-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
        }

        .info-box h2 {
            font-size: 0.9em;
            margin-bottom: 12px;
            opacity: 0.9;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-box .value {
            font-size: 2.5em;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        #next-piece {
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .controls {
            background: rgba(248, 249, 250, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            font-size: 0.85em;
            color: #666;
            line-height: 1.9;
            box-shadow: var(--shadow-sm);
        }

        .controls h3 {
            color: #1d1d1f;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 1.1em;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 1.1em;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .game-over-content {
            background: white;
            padding: 50px;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-xl);
            animation: scaleIn 0.4s ease-out;
            max-width: 400px;
        }

        .game-over-content h2 {
            font-size: 2.5em;
            color: #e74c3c;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .game-over-content p {
            font-size: 1.3em;
            color: #1d1d1f;
            margin-bottom: 20px;
        }

        .game-over-content #final-score {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
            display: block;
            margin-top: 12px;
        }

        #pause-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            animation: fadeIn 0.2s ease-out;
        }

        .pause-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.3s ease-out;
        }

        .pause-content h2 {
            font-size: 2em;
            color: #1d1d1f;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .pause-content p {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .pause-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .pause-buttons button {
            flex: 1;
        }

        #combo-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                         0 0 40px rgba(255, 215, 0, 0.6);
            z-index: 998;
            pointer-events: none;
            opacity: 0;
            animation: comboAnimation 1s ease-out;
        }

        @keyframes comboAnimation {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .best-score {
            font-size: 0.9em;
            color: #999;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 20px 10px;
            }

            .container {
                padding: 20px;
                width: 100%;
            }

            h1 {
                font-size: 2em;
                margin-bottom: 20px;
            }

            .game-area {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            #game-board {
                width: 280px !important;
                height: 560px !important;
            }

            .info-panel {
                width: 100%;
                max-width: 280px;
            }

            .game-over-content,
            .pause-content {
                padding: 30px;
                margin: 0 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 사용자 정보 표시 -->
    <div id="user-info" style="position: fixed; top: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: none; z-index: 1000;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-weight: 600; color: #667eea;" id="username-display"></span>
            <button onclick="showLeaderboard()" style="background: #667eea; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;">순위표</button>
            <button onclick="logout()" style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;">로그아웃</button>
        </div>
    </div>

    <!-- 로그인/회원가입 버튼 -->
    <div id="auth-buttons" style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
        <button onclick="showAuthModal('login')" style="background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px; font-size: 14px; font-weight: 600;">로그인</button>
    </div>

    <div class="container">
        <h1>🎮 테트리스</h1>
        <div class="game-area">
            <canvas id="game-board" width="300" height="600"></canvas>
            <div class="info-panel">
                <div class="info-box">
                    <h2>점수</h2>
                    <div class="value" id="score">0</div>
                </div>
                <div class="info-box">
                    <h2>레벨</h2>
                    <div class="value" id="level">1</div>
                </div>
                <div class="info-box">
                    <h2>라인</h2>
                    <div class="value" id="lines">0</div>
                </div>
                <div class="info-box">
                    <h2>다음 블록</h2>
                    <canvas id="next-piece" width="120" height="120"></canvas>
                </div>
                <button id="start-btn">🔒 로그인 후 시작</button>
                <div class="controls">
                    <h3>⌨️ 조작법</h3>
                    <div>← → 좌우 이동</div>
                    <div>↓ 빠르게 내리기</div>
                    <div>↑ 회전</div>
                    <div>Space 한번에 내리기</div>
                    <div><strong>P / ESC</strong> 일시정지</div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-over-overlay">
        <div class="game-over-content">
            <h2>게임 오버!</h2>
            <p>최종 점수: <span id="final-score">0</span></p>
            <div class="best-score" id="best-score-display"></div>
            <button id="restart-btn">다시 시작</button>
        </div>
    </div>

    <div id="pause-overlay">
        <div class="pause-content">
            <h2>⏸️ 일시정지</h2>
            <p>현재 점수: <strong id="pause-score">0</strong></p>
            <div class="pause-buttons">
                <button id="resume-btn">계속하기</button>
                <button id="restart-from-pause-btn">재시작</button>
            </div>
        </div>
    </div>

    <div id="combo-message"></div>

    <!-- 로그인/회원가입 모달 -->
    <div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
            <div id="login-form">
                <h2 style="margin-bottom: 20px; color: #667eea;">로그인</h2>
                <input type="email" id="login-email" placeholder="이메일" onkeypress="if(event.key==='Enter') handleLogin()" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                <input type="password" id="login-password" placeholder="비밀번호" onkeypress="if(event.key==='Enter') handleLogin()" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                <div id="login-error" style="color: #dc3545; margin-bottom: 10px; font-size: 13px; display: none;"></div>
                <button onclick="handleLogin()" style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 10px;">로그인</button>
                <button onclick="showRegisterForm()" style="width: 100%; padding: 12px; background: #f0f0f0; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">회원가입</button>
                <button onclick="hideAuthModal()" style="width: 100%; padding: 10px; background: transparent; color: #999; border: none; cursor: pointer; font-size: 13px; margin-top: 10px;">닫기</button>
            </div>
            <div id="register-form" style="display: none;">
                <h2 style="margin-bottom: 20px; color: #667eea;">회원가입</h2>
                <input type="text" id="register-username" placeholder="닉네임 (영문, 숫자만 가능)" onkeypress="if(event.key==='Enter') handleRegister()" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                <input type="email" id="register-email" placeholder="이메일" onkeypress="if(event.key==='Enter') handleRegister()" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                <input type="password" id="register-password" placeholder="비밀번호 (대문자, 소문자, 숫자 포함 8자 이상)" onkeypress="if(event.key==='Enter') handleRegister()" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px;">
                <div id="register-error" style="color: #dc3545; margin-bottom: 10px; font-size: 13px; display: none;"></div>
                <button onclick="handleRegister()" style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 10px;">가입하기</button>
                <button onclick="showLoginForm()" style="width: 100%; padding: 12px; background: #f0f0f0; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">로그인으로</button>
                <button onclick="hideAuthModal()" style="width: 100%; padding: 10px; background: transparent; color: #999; border: none; cursor: pointer; font-size: 13px; margin-top: 10px;">닫기</button>
            </div>
        </div>
    </div>

    <!-- 리더보드 모달 -->
    <div id="leaderboard-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 40px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
            <h2 style="margin-bottom: 20px; color: #667eea; text-align: center;">🏆 순위표</h2>
            <div id="leaderboard-list"></div>
            <button onclick="hideLeaderboard()" style="width: 100%; padding: 12px; background: #f0f0f0; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 20px;">닫기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next-piece');
        const nextCtx = nextCanvas.getContext('2d');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        // 테트로미노 모양 정의
        const SHAPES = [
            [[1, 1, 1, 1]], // I
            [[1, 1], [1, 1]], // O
            [[1, 1, 1], [0, 1, 0]], // T
            [[1, 1, 1], [1, 0, 0]], // L
            [[1, 1, 1], [0, 0, 1]], // J
            [[1, 1, 0], [0, 1, 1]], // S
            [[0, 1, 1], [1, 1, 0]]  // Z
        ];

        const COLORS = [
            '#00f0f0', // I - 시안
            '#f0f000', // O - 노랑
            '#a000f0', // T - 보라
            '#f0a000', // L - 주황
            '#0000f0', // J - 파랑
            '#00f000', // S - 초록
            '#f00000'  // Z - 빨강
        ];

        // API 설정
        const API_BASE_URL = 'http://localhost:8001/api/v1';

        // 게임 상태
        let board = [];
        let score = 0;
        let level = 1;
        let lines = 0;
        let currentPiece = null;
        let nextPiece = null;
        let gameInterval = null;
        let gameRunning = false;
        let gamePaused = false;
        let bestScore = localStorage.getItem('tetris-best-score') || 0;
        let animationFrameId = null;

        // 인증 상태
        let authToken = localStorage.getItem('tetris-auth-token') || null;
        let currentUser = null;
        let gameStartTime = null;

        // 게임 보드 초기화
        function initBoard() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        }

        // 새 블록 생성
        function createPiece() {
            const shapeIndex = Math.floor(Math.random() * SHAPES.length);
            return {
                shape: SHAPES[shapeIndex],
                color: COLORS[shapeIndex],
                x: Math.floor(COLS / 2) - Math.floor(SHAPES[shapeIndex][0].length / 2),
                y: 0
            };
        }

        // 블록 회전
        function rotate(piece) {
            const rotated = piece.shape[0].map((_, i) =>
                piece.shape.map(row => row[i]).reverse()
            );
            return { ...piece, shape: rotated };
        }

        // 충돌 감지
        function collision(piece, offsetX = 0, offsetY = 0) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (piece.shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }
                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 블록 합치기
        function merge() {
            currentPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                });
            });
        }

        // 완성된 라인 제거
        function clearLines() {
            let linesCleared = 0;

            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }

            if (linesCleared > 0) {
                lines += linesCleared;
                score += [0, 100, 300, 500, 800][linesCleared] * level;
                level = Math.floor(lines / 10) + 1;
                updateDisplay();
                showComboMessage(linesCleared);
            }
        }

        // 콤보 메시지 표시
        function showComboMessage(linesCleared) {
            const messages = ['', 'SINGLE!', 'DOUBLE!', 'TRIPLE!', 'TETRIS!'];
            const comboEl = document.getElementById('combo-message');
            comboEl.textContent = messages[linesCleared] || '';
            comboEl.style.animation = 'none';
            setTimeout(() => {
                comboEl.style.animation = 'comboAnimation 1s ease-out';
            }, 10);
        }

        // 화면 표시 업데이트
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }

        // 고스트 피스 Y 위치 계산
        function getGhostY() {
            if (!currentPiece) return 0;
            let ghostY = currentPiece.y;
            while (!collision({ ...currentPiece, y: ghostY }, 0, 1)) {
                ghostY++;
            }
            return ghostY;
        }

        // 보드 그리기
        function drawBoard() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 고정된 블록 그리기
            board.forEach((row, y) => {
                row.forEach((color, x) => {
                    if (color) {
                        drawBlock(ctx, x, y, color);
                    }
                });
            });

            // 고스트 피스 그리기
            if (currentPiece && gameRunning && !gamePaused) {
                const ghostY = getGhostY();
                if (ghostY !== currentPiece.y) {
                    currentPiece.shape.forEach((row, y) => {
                        row.forEach((value, x) => {
                            if (value) {
                                drawGhostBlock(ctx, currentPiece.x + x, ghostY + y);
                            }
                        });
                    });
                }
            }

            // 현재 블록 그리기
            if (currentPiece) {
                currentPiece.shape.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value) {
                            drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, currentPiece.color);
                        }
                    });
                });
            }

            // 그리드 선 그리기
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }
        }

        // 고스트 블록 그리기
        function drawGhostBlock(context, x, y) {
            context.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            context.lineWidth = 2;
            context.strokeRect(x * BLOCK_SIZE + 2, y * BLOCK_SIZE + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
        }

        // 블록 그리기
        function drawBlock(context, x, y, color) {
            context.fillStyle = color;
            context.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);

            // 3D 효과
            context.fillStyle = 'rgba(255, 255, 255, 0.3)';
            context.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, 3);
            context.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, 3, BLOCK_SIZE - 2);
        }

        // 다음 블록 미리보기
        function drawNextPiece() {
            nextCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (nextPiece) {
                const offsetX = (nextCanvas.width / BLOCK_SIZE - nextPiece.shape[0].length) / 2;
                const offsetY = (nextCanvas.height / BLOCK_SIZE - nextPiece.shape.length) / 2;

                nextPiece.shape.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value) {
                            drawBlock(nextCtx, offsetX + x, offsetY + y, nextPiece.color);
                        }
                    });
                });
            }
        }

        // 블록 이동
        function moveDown() {
            if (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                merge();
                clearLines();
                currentPiece = nextPiece;
                nextPiece = createPiece();
                drawNextPiece();

                if (collision(currentPiece)) {
                    gameOver();
                }
            }
            drawBoard();
        }

        // 한번에 내리기
        function dropDown() {
            while (!collision(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            updateDisplay();
            moveDown();
        }

        // 일시정지 토글
        function togglePause() {
            if (!gameRunning) return;

            gamePaused = !gamePaused;
            const pauseOverlay = document.getElementById('pause-overlay');

            if (gamePaused) {
                clearInterval(gameInterval);
                document.getElementById('pause-score').textContent = score;
                pauseOverlay.style.display = 'flex';
            } else {
                pauseOverlay.style.display = 'none';
                gameInterval = setInterval(() => {
                    moveDown();
                }, 1000 - (level - 1) * 100);
            }
        }

        // 키보드 입력 처리
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || !currentPiece) return;

            // 일시정지
            if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
                e.preventDefault();
                togglePause();
                return;
            }

            if (gamePaused) return;

            switch(e.key) {
                case 'ArrowLeft':
                    if (!collision(currentPiece, -1, 0)) {
                        currentPiece.x--;
                    }
                    break;
                case 'ArrowRight':
                    if (!collision(currentPiece, 1, 0)) {
                        currentPiece.x++;
                    }
                    break;
                case 'ArrowDown':
                    if (!collision(currentPiece, 0, 1)) {
                        currentPiece.y++;
                        score += 1;
                        updateDisplay();
                    }
                    break;
                case 'ArrowUp':
                    const rotated = rotate(currentPiece);
                    if (!collision(rotated)) {
                        currentPiece = rotated;
                    }
                    break;
                case ' ':
                    e.preventDefault();
                    dropDown();
                    break;
            }
            drawBoard();
        });

        // 게임 시작
        function startGame() {
            // 로그인 체크
            if (!authToken || !currentUser) {
                alert('게임을 시작하려면 로그인이 필요합니다!');
                showAuthModal('login');
                return;
            }

            initBoard();
            score = 0;
            level = 1;
            lines = 0;
            gameRunning = true;
            gamePaused = false;
            gameStartTime = Date.now();

            currentPiece = createPiece();
            nextPiece = createPiece();

            updateDisplay();
            updateBestScoreDisplay();
            drawBoard();
            drawNextPiece();

            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                moveDown();
            }, 1000 - (level - 1) * 100);

            document.getElementById('start-btn').textContent = '게임 중...';
            document.getElementById('start-btn').disabled = true;
            document.getElementById('pause-overlay').style.display = 'none';
        }

        // 최고 점수 표시 업데이트
        function updateBestScoreDisplay() {
            const bestScoreEl = document.getElementById('best-score-display');
            if (bestScore > 0) {
                bestScoreEl.textContent = `🏆 최고 기록: ${bestScore}`;
            }
        }

        // 게임 오버
        async function gameOver() {
            gameRunning = false;
            gamePaused = false;
            clearInterval(gameInterval);

            // 백엔드에 점수 제출 (로그인한 경우)
            if (authToken && currentUser) {
                const gameDuration = gameStartTime ?
                    Math.floor((Date.now() - gameStartTime) / 1000) : null;

                try {
                    const response = await fetch(`${API_BASE_URL}/games/submit`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authToken}`
                        },
                        body: JSON.stringify({
                            score: score,
                            lines_cleared: lines,
                            level_reached: level,
                            duration_seconds: gameDuration,
                            device_type: /mobile/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
                        })
                    });

                    if (response.ok) {
                        const result = await response.json();
                        console.log('게임 저장 완료! 전체 순위:', result.rank.global);
                    }
                } catch (error) {
                    console.error('게임 저장 실패:', error);
                }
            }

            // 최고 점수 갱신 (로컬 저장소)
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('tetris-best-score', bestScore);
            }

            animateScore(0, score, 1000);
            updateBestScoreDisplay();
            document.getElementById('game-over-overlay').style.display = 'flex';
            document.getElementById('start-btn').textContent = '시작';
            document.getElementById('start-btn').disabled = false;
        }

        // 점수 카운트업 애니메이션
        function animateScore(start, end, duration) {
            const startTime = performance.now();
            const finalScoreEl = document.getElementById('final-score');

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.floor(start + (end - start) * progress);
                finalScoreEl.textContent = current;

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        // 이벤트 리스너
        document.getElementById('start-btn').addEventListener('click', startGame);

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-overlay').style.display = 'none';
            startGame();
        });

        document.getElementById('resume-btn').addEventListener('click', () => {
            togglePause();
        });

        document.getElementById('restart-from-pause-btn').addEventListener('click', () => {
            document.getElementById('pause-overlay').style.display = 'none';
            gamePaused = false;
            startGame();
        });

        // 터치 컨트롤 (모바일)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning || gamePaused || !currentPiece) return;

            touchEndX = e.changedTouches[0].clientX;
            touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 좌우 스와이프
                if (Math.abs(deltaX) > 30) {
                    if (deltaX > 0) {
                        if (!collision(currentPiece, 1, 0)) {
                            currentPiece.x++;
                        }
                    } else {
                        if (!collision(currentPiece, -1, 0)) {
                            currentPiece.x--;
                        }
                    }
                }
            } else {
                // 상하 스와이프
                if (Math.abs(deltaY) > 30) {
                    if (deltaY > 0) {
                        // 아래로 스와이프 - 소프트 드롭
                        if (!collision(currentPiece, 0, 1)) {
                            currentPiece.y++;
                            score += 1;
                            updateDisplay();
                        }
                    } else {
                        // 위로 스와이프 - 회전
                        const rotated = rotate(currentPiece);
                        if (!collision(rotated)) {
                            currentPiece = rotated;
                        }
                    }
                }
            }

            // 탭 (짧은 터치) - 하드 드롭
            if (Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
                dropDown();
            }

            drawBoard();
        });

        // ==================== 인증 및 API 함수 ====================

        // 페이지 로드 시 인증 확인
        async function checkAuth() {
            const token = localStorage.getItem('tetris-auth-token');
            if (token) {
                try {
                    const response = await fetch(`${API_BASE_URL}/users/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        currentUser = await response.json();
                        authToken = token;
                        showUserInfo();
                    } else {
                        localStorage.removeItem('tetris-auth-token');
                        authToken = null;
                    }
                } catch (error) {
                    console.error('인증 확인 실패:', error);
                }
            }
        }

        // 로그인
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            // 입력 검증
            if (!email) {
                errorEl.textContent = '이메일을 입력해주세요';
                errorEl.style.display = 'block';
                return;
            }
            if (!password) {
                errorEl.textContent = '비밀번호를 입력해주세요';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';

            try {
                console.log('로그인 시도:', email);
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('로그인 응답:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    authToken = data.access_token;
                    currentUser = data.user;
                    localStorage.setItem('tetris-auth-token', authToken);
                    showUserInfo();
                    hideAuthModal();
                    errorEl.style.display = 'none';
                    console.log('로그인 성공:', currentUser);
                } else {
                    const error = await response.json();
                    errorEl.textContent = error.detail || '로그인에 실패했습니다';
                    errorEl.style.display = 'block';
                    console.error('로그인 실패:', error);
                }
            } catch (error) {
                errorEl.textContent = '네트워크 오류: 백엔드 서버가 실행 중인지 확인하세요';
                errorEl.style.display = 'block';
                console.error('네트워크 에러:', error);
            }
        }

        // 회원가입
        async function handleRegister() {
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const username = document.getElementById('register-username').value.trim() || null;
            const errorEl = document.getElementById('register-error');

            // 입력 검증
            if (!email) {
                errorEl.textContent = '이메일을 입력해주세요';
                errorEl.style.display = 'block';
                return;
            }
            if (!password) {
                errorEl.textContent = '비밀번호를 입력해주세요';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';

            try {
                console.log('회원가입 시도:', { email, username });
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, username })
                });

                console.log('회원가입 응답:', response.status);

                if (response.ok) {
                    // 회원가입 성공 후 자동 로그인
                    alert('회원가입 성공! 자동으로 로그인됩니다.');
                    document.getElementById('login-email').value = email;
                    document.getElementById('login-password').value = password;
                    showLoginForm();
                    await handleLogin();
                } else {
                    const error = await response.json();
                    console.error('회원가입 에러:', error);

                    // 에러 메시지 파싱
                    let errorMessage = '회원가입에 실패했습니다';
                    if (error.detail) {
                        if (typeof error.detail === 'string') {
                            errorMessage = error.detail;
                        } else if (Array.isArray(error.detail)) {
                            errorMessage = error.detail.map(e => e.msg || e.message).join(', ');
                        }
                    }

                    errorEl.textContent = errorMessage;
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                console.error('네트워크 에러:', error);
                errorEl.textContent = '네트워크 오류: 백엔드 서버가 실행 중인지 확인하세요';
                errorEl.style.display = 'block';
            }
        }

        // 로그아웃
        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('tetris-auth-token');
            hideUserInfo();
        }

        // 리더보드 불러오기
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_BASE_URL}/games/leaderboard?limit=20`);
                if (response.ok) {
                    const data = await response.json();
                    displayLeaderboard(data.leaderboard);
                }
            } catch (error) {
                console.error('리더보드 로드 실패:', error);
            }
        }

        // 리더보드 표시
        function displayLeaderboard(leaderboard) {
            const listEl = document.getElementById('leaderboard-list');
            if (leaderboard.length === 0) {
                listEl.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">아직 기록이 없습니다</p>';
                return;
            }

            let html = '<table style="width: 100%; border-collapse: collapse;">';
            html += '<thead><tr style="background: #f8f9fa; border-bottom: 2px solid #dee2e6;">';
            html += '<th style="padding: 12px; text-align: center;">순위</th>';
            html += '<th style="padding: 12px; text-align: left;">닉네임</th>';
            html += '<th style="padding: 12px; text-align: right;">점수</th>';
            html += '<th style="padding: 12px; text-align: center;">레벨</th>';
            html += '</tr></thead><tbody>';

            leaderboard.forEach(entry => {
                const isCurrentUser = currentUser && entry.username === currentUser.username;
                const rowStyle = isCurrentUser ? 'background: #e7f3ff; font-weight: 600;' : '';
                html += `<tr style="border-bottom: 1px solid #dee2e6; ${rowStyle}">`;
                html += `<td style="padding: 10px; text-align: center;">${entry.rank}${entry.rank === 1 ? '🥇' : entry.rank === 2 ? '🥈' : entry.rank === 3 ? '🥉' : ''}</td>`;
                html += `<td style="padding: 10px;">${entry.username}</td>`;
                html += `<td style="padding: 10px; text-align: right; font-weight: 600;">${entry.score.toLocaleString()}</td>`;
                html += `<td style="padding: 10px; text-align: center;">${entry.level_reached}</td>`;
                html += '</tr>';
            });

            html += '</tbody></table>';
            listEl.innerHTML = html;
        }

        // UI 제어 함수들
        function showUserInfo() {
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('auth-buttons').style.display = 'none';
            document.getElementById('username-display').textContent = currentUser.username || currentUser.email.split('@')[0];
            // 시작 버튼 활성화
            document.getElementById('start-btn').textContent = '🎮 시작';
            document.getElementById('start-btn').disabled = false;
        }

        function hideUserInfo() {
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('auth-buttons').style.display = 'block';
            // 시작 버튼 비활성화
            document.getElementById('start-btn').textContent = '🔒 로그인 후 시작';
            document.getElementById('start-btn').disabled = false;
        }

        function showAuthModal(mode) {
            document.getElementById('auth-modal').style.display = 'flex';
            if (mode === 'login') {
                showLoginForm();
            } else {
                showRegisterForm();
            }
        }

        function hideAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
        }

        function showLoginForm() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        }

        function showRegisterForm() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }

        function showLeaderboard() {
            document.getElementById('leaderboard-modal').style.display = 'flex';
            loadLeaderboard();
        }

        function hideLeaderboard() {
            document.getElementById('leaderboard-modal').style.display = 'none';
        }

        // 페이지 로드 시 실행
        window.addEventListener('DOMContentLoaded', checkAuth);

        // 초기 화면
        updateBestScoreDisplay();
        drawBoard();
        drawNextPiece();
    </script>
</body>
</html>
