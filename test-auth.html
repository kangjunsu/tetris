<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>인증 테스트</title>
</head>
<body>
    <h1>회원가입 테스트</h1>
    <div>
        <input type="email" id="email" placeholder="이메일" value="test999@test.com">
        <input type="password" id="password" placeholder="비밀번호" value="Test1234!">
        <input type="text" id="username" placeholder="사용자명" value="test999">
        <button onclick="testRegister()">회원가입</button>
    </div>
    <div id="result"></div>

    <script>
        const API_BASE_URL = 'http://localhost:8001/api/v1';
        
        async function testRegister() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, username })
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                
                if (response.ok) {
                    alert('회원가입 성공!');
                }
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    `<pre style="color:red;">Error: ${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
